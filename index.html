<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <!-- iPhone PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ポモドーロ">
  <meta name="theme-color" content="#141414">
</head>
<body>
  <div class="app">
    <h1>ポモドーロタイマー</h1>

    <div class="mode-tabs">
      <button class="tab active" data-mode="work">作業</button>
      <button class="tab" data-mode="shortBreak">小休憩</button>
      <button class="tab" data-mode="longBreak">長休憩</button>
    </div>

    <div class="timer-display">
      <span id="time">25:00</span>
    </div>

    <div class="controls">
      <button id="startPauseBtn" class="btn-primary">スタート</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>

    <div class="music-control">
      <button id="musicBtn" class="btn-music">♪ 音楽をオン</button>
      <div class="genre-selector" id="genreSelector">
        <select id="genreSelect" class="select-genre">
          <option value="jazz">ジャズ</option>
          <option value="healing">ヒーリング</option>
        </select>
      </div>
    </div>

    <div class="pomodoro-count">
      <span>完了したポモドーロ: </span>
      <span id="count">0</span>
      <div id="dots"></div>
    </div>

    <div class="visual-control">
      <button class="btn-visual active" data-visual="figure">棒人間</button>
      <button class="btn-visual" data-visual="stars">星空</button>
      <button class="btn-visual" data-visual="aurora">オーロラ</button>
    </div>

    <canvas id="visualizer"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
