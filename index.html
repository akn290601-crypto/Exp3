<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ポモドーロ">
  <meta name="theme-color" content="#141414">
</head>
<body>
  <canvas id="visualizer"></canvas>

  <div class="app">

    <div class="mode-tabs">
      <button class="tab active" data-mode="work">作業</button>
      <button class="tab" data-mode="shortBreak">小休憩</button>
    </div>

    <div class="timer-display">
      <svg class="progress-ring" viewBox="0 0 280 280">
        <circle class="progress-track" cx="140" cy="140" r="128"/>
        <circle class="progress-fill" id="progressFill" cx="140" cy="140" r="128"/>
      </svg>
      <span id="time">25:00</span>
    </div>

    <div class="count-row">
      <span id="count">0</span>
    </div>

    <div class="controls">
      <button id="startPauseBtn" class="btn-primary">スタート</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>

    <div class="settings-row">
      <div class="settings-top">
        <div class="setting-item">
          <span class="setting-icon">♪</span>
          <select id="genreSelect" class="select-control">
            <option value="none">なし</option>
            <option value="jazz">ジャズ</option>
            <option value="future">フューチャー</option>
            <option value="healing">ヒーリング</option>
            <option value="manchester">マンチェスター</option>
          </select>
        </div>

      </div>
      <div class="setting-item">
        <span class="setting-icon">◈</span>
        <select id="visualSelect" class="select-control">
          <option value="aurora">オーロラ↓</option>
          <option value="aurora-up">オーロラ↑</option>
          <option value="stars">星空</option>
          <option value="ripple">波紋</option>
          <option value="smoke">流煙</option>
          <option value="deep">深海</option>
          <option value="network">ネットワーク</option>
          <option value="grid">グリッド</option>
          <option value="luxury">金箔</option>
        </select>
      </div>
    </div>

    <p class="app-title">Pomodoro Timer</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
